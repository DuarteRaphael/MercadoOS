version: '3.9'
services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    image: mercados-web:latest
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
    depends_on:
      - api
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: mercados-api:latest
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=production
